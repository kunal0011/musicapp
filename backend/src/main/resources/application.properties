spring.application.name=api

# PostgreSQL (local dev — Docker maps 5434 -> 5432)
spring.datasource.url=jdbc:postgresql://localhost:5434/musicapp
spring.datasource.username=musicapp_user
spring.datasource.password=musicapp_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA — schema managed by Flyway, not Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# MinIO (local dev)
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=musicapp

# JWT (change in production — min 256-bit base64 key)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Redis (local dev)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache — simple (in-memory) for local dev; Redis in docker profile
spring.cache.type=simple

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.musicapp=INFO
logging.level.org.springframework.security=WARN
